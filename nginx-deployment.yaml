apiVersion: apps/v1 
kind: Deployment 
metadata: 
  name: mynginx 
spec: 
  replicas: 3
  strategy: 
    type: Recreate 
  selector: 
    matchLabels: 
      app: mynginx 
  template: 
    metadata: 
      labels: 
        app: mynginx 
    spec: 
      containers: 
      - image: nginx:1.27.4
        name: mynginx
        imagePullPolicy: Always
        ports:
        - containerPort: 80


