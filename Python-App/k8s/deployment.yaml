apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-flask-app
spec:
  selector:
    matchLabels:
      app: flask-app
  replicas: 3
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        image: flask-app:1.1.0
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "32Mi"
            cpu: "100m"
          limits:
            memory: "64Mi"
            cpu: "250m"
        ports:
        - containerPort: 5000
          protocol: TCP
        envFrom:
          - configMapRef:
              name: flask-app-config
        # livenessProbe is configured to check if the application
        # service is running or is hung; otherwise this will
        # restart the container and cause downtime.
        # The livenessProbe checks the /health endpoint every 15s,
        # with an initial delay of 10s and a 3s timeout. 3 failures -> restart.
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3

        # readinessProbe removes the pod from service endpoints when not ready.
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
              

